<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Min side</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      position: relative;
      background: black;
    }

    /* 📸 BILDE (mobil først) */
    img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: 0;

      opacity: 0;
      transform: scale(1.1);
      animation: fadeInImage 2s ease forwards, zoomIn 10s ease forwards;
    }

    /* 💻 PC: vis hele bildet */
    @media (min-width: 900px) {
      img {
        object-fit: contain;
        background: black;
      }
    }

    /* 📝 TEKST NEDERST */
    .overlay {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);

      text-align: center;
      z-index: 2;
      color: white;
      width: 90%;
      max-width: 800px;

      padding: 20px;

      background: radial-gradient(
        ellipse at center,
        rgba(0, 0, 0, 0.6) 0%,
        rgba(0, 0, 0, 0.25) 60%,
        rgba(0, 0, 0, 0) 100%
      );

      opacity: 0;
      animation: fadeUp 1.5s ease forwards;
      animation-delay: 0.8s;
    }

    /* 🔠 Linje 1, 2 og 4 */
    h1,
    p:nth-of-type(1),
    p:nth-of-type(3) {
      font-size: 2.2rem;
      margin: 10px 0;
      font-weight: 600;
    }

    h1 {
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* 🔥 Linje 3 (highlight) */
    p:nth-of-type(2) {
      font-size: 3.2rem;
      font-weight: 700;
      margin: 16px 0;
      position: relative;

      text-shadow:
        0 0 10px rgba(255,255,255,0.4),
        0 0 20px rgba(255,255,255,0.3);

      transform: scale(0.95);
      animation: popIn 1s ease forwards;
      animation-delay: 1.2s;
    }

    /* ✨ Highlight bak */
    p:nth-of-type(2)::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 110%;
      height: 120%;
      background: radial-gradient(
        ellipse,
        rgba(255,255,255,0.15),
        rgba(255,255,255,0)
      );
      z-index: -1;
      border-radius: 10px;
    }

    /* 🎬 ANIMASJONER */
    @keyframes fadeInImage {
      to { opacity: 1; }
    }

    @keyframes zoomIn {
      to { transform: scale(1); }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translate(-50%, 20px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    @keyframes popIn {
      to {
        transform: scale(1);
      }
    }

    /* 📱 Litt bedre mobil */
    @media (max-width: 600px) {
      h1,
      p:nth-of-type(1),
      p:nth-of-type(3) {
        font-size: 1.6rem;
      }

      p:nth-of-type(2) {
        font-size: 2.2rem;
      }
    }

  </style>
</head>

<body>

  <img src="plane.jpeg" alt="Bilde">

  <div class="overlay">
    <p>We just love them</p>
    <p>and will always support them heavily.</p>
    <p>Support your local gold diggers!</p>
    <p>Per Eskeland - Chairman and Founder - golddiggers.no</p>
  </div>

</body>
</html>
