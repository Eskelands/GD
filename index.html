<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Min side</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      position: relative;
      background: black;
    }

    /* BAKGRUNNSBILDE */
    img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: 0;

      opacity: 0;
      animation: fadeInImage 2s ease forwards;
    }

    /* 🌫 HERO GRADIENT (bedre lesbarhet) */
    .gradient {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 60%;
      z-index: 1;

      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.75),
        rgba(0, 0, 0, 0)
      );
    }

    /* TEKST HERO */
    .overlay {
      position: absolute;
      top: 0;
      width: 100%;
      text-align: center;
      z-index: 2;

      color: white;
      padding-top: 40px;

      opacity: 0;
      transform: translateY(-20px);
      animation: fadeInText 2s ease forwards;
      animation-delay: 0.8s;
    }

    h1 {
      margin: 0;
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    p {
      margin: 12px 0;
      font-size: 1.3rem;
      opacity: 0.9;
    }

    /* 🎬 ANIMASJONER */
    @keyframes fadeInImage {
      to {
        opacity: 1;
      }
    }

    @keyframes fadeInText {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <img src="golddiggers.jpeg" alt="Bilde">

  <!-- gradient overlay -->
  <div class="gradient"></div>

  <!-- hero tekst -->
  <div class="overlay">
    <h1>We just love them</h1>
    <p>and will always support them heavily.</p>
    <p>Support your local gold diggers!</p>
    <p>Per Eskeland - Chairman and Founder, golddiggers.no</p>
  </div>

</body>
</html>
