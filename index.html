<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Min side</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      position: relative;
      background: black;
    }

    /* BAKGRUNNSBILDE */
    img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: 0;

      opacity: 0;
      transform: scale(1.1);
      animation: fadeInImage 2s ease forwards, zoomIn 10s ease forwards;
    }

    /* TEKST NEDERST */
    .overlay {
      position: absolute;
      bottom: 5%; /* 🔥 flyttet til bunn */
      left: 50%;
      transform: translateX(-50%);

      text-align: center;
      z-index: 2;
      color: white;
      width: 90%;
      max-width: 800px;

      padding: 20px;

      background: radial-gradient(
        ellipse at center,
        rgba(0, 0, 0, 0.6) 0%,
        rgba(0, 0, 0, 0.25) 60%,
        rgba(0, 0, 0, 0) 100%
      );

      opacity: 0;
      animation: fadeUp 1.5s ease forwards;
      animation-delay: 0.8s;
    }

    h1 {
      margin: 0;
      font-size: 2.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    p {
      margin: 10px 0;
    }

    /* 🔽 mindre linje 2 og 3 */
    p:nth-of-type(1),
    p:nth-of-type(2) {
      font-size: 2rem;
    }

    p:nth-of-type(3) {
      font-size: 1.4rem;
      opacity: 0.9;
    }

    /* ANIMASJONER */
    @keyframes fadeInImage {
      to { opacity: 1; }
    }

    @keyframes zoomIn {
      to { transform: scale(1); }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translate(-50%, 20px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }
  </style>
</head>

<body>

  <img src="golddiggers.jpeg" alt="Bilde">

  <div class="overlay">
    <h1>We just love them</h1>
    <p>and will always support them heavily.</p>
    <p>Support your local gold diggers!</p>
    <p>Per Eskeland - Chairman and Founder, golddiggers.no</p>
  </div>

</body>
</html>
