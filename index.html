<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Min side</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      position: relative;
      background: black;
    }

    /* BAKGRUNNSBILDE */
    img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: 0;
    }

    /* GLASS CONTAINER */
    .overlay {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);

      width: 90%;
      max-width: 800px;
      text-align: center;

      color: black;
      z-index: 2;

      padding: 25px 20px;

      /* 🌫 glassmorphism */
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);

      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);

      /* fade-in */
      opacity: 0;
      transform: translate(-50%, -20px);
      animation: fadeInText 2s ease forwards;
      animation-delay: 0.8s;
    }

    h1 {
      margin: 0;
      font-size: 2.4rem;
      letter-spacing: 0.5px;
    }

    p {
      margin: 10px 0;
      font-size: 1rem;
      line-height: 1.5;
    }

    /* ANIMASJON */
    @keyframes fadeInText {
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }
  </style>
</head>

<body>

  <img src="golddiggers.jpeg" alt="Bilde">

  <div class="overlay">
    <h1>Support your local gold diggers!</h1>
    <p>We just love them</p>
    <p>and will always support them heavily.</p>
    <p>Per Eskeland - Chairman and Founder / golddiggers.no</p>
  </div>

</body>
</html>
