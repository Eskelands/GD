<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Min side</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      position: relative;
      background: black;
    }

    /* BAKGRUNNSBILDE */
    .hero-image {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: 0;

      opacity: 0;
      transform: scale(1.1);
      animation: fadeInImage 2s ease forwards, zoomIn 10s ease forwards;
    }

    /* TEKSTBOKS */
    .overlay {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);

      text-align: center;
      z-index: 2;
      color: white;
      width: 90%;
      max-width: 900px;

      padding: 20px;

      background: radial-gradient(
        ellipse at center,
        rgba(0, 0, 0, 0.6) 0%,
        rgba(0, 0, 0, 0.25) 60%,
        rgba(0, 0, 0, 0) 100%
      );

      opacity: 0;
      animation: fadeUp 1.5s ease forwards;
      animation-delay: 0.8s;
    }

    .line {
      margin: 10px 0;
    }

    /* Vanlige linjer (1 og 2 nå) */
    .line-normal {
      font-size: 2.2rem;
      font-weight: 600;
    }

    /* 🔥 Highlight (LINJE 3) */
    .highlight {
      font-size: 2.4rem;
      font-weight: 700;
      margin: 16px 0;
      position: relative;
      white-space: nowrap;

      text-shadow:
        0 0 10px rgba(255,255,255,0.4),
        0 0 20px rgba(255,255,255,0.3);

      transform: scale(0.95);
      animation: popIn 1s ease forwards;
      animation-delay: 1.2s;
    }

    .highlight::before {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 110%;
      height: 120%;
      background: radial-gradient(
        ellipse,
        rgba(255,255,255,0.15),
        rgba(255,255,255,0)
      );
      z-index: -1;
      border-radius: 10px;
    }

    /* ANIMASJONER */
    @keyframes fadeInImage {
      to { opacity: 1; }
    }

    @keyframes zoomIn {
      to { transform: scale(1); }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translate(-50%, 20px);
      }
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    @keyframes popIn {
      to {
        transform: scale(1);
      }
    }

    /* 📱 MOBIL */
    @media (max-width: 600px) {
      .line-normal {
        font-size: 1.4rem;
      }

      .highlight {
        font-size: 1.6rem;
        white-space: normal;
      }
    }

  </style>
</head>

<body>

  <img class="hero-image" src="plane.jpeg" alt="Bilde">

  <div class="overlay">
    <p class="line line-normal">We just love them</p>
    <p class="line line-normal">and will always support them heavily.</p>
    <p class="line highlight">Support your local gold diggers!</p>
    <p class="line line-normal">Per Eskeland - Chairman and Founder - golddiggers.no</p>
  </div>

</body>
</html>
