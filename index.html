<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Min side</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, sans-serif;
      position: relative;
      background: black;
    }

    /* BAKGRUNNSBILDE */
    img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      z-index: 0;

      opacity: 0;
      transform: scale(1.1);
      animation: fadeInImage 2s ease forwards, zoomIn 10s ease forwards;
    }

    /* GRADIENT */
    .gradient {
      position: absolute;
      inset: 0;
      z-index: 1;

      background: linear-gradient(
        to bottom,
        rgba(0, 0, 0, 0.6),
        rgba(0, 0, 0, 0.3),
        rgba(0, 0, 0, 0.6)
      );
    }

    /* 🎯 TEKST LITT NED I BILDET */
    .overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -35%);
      text-align: center;

      z-index: 2;
      color: white;
      width: 90%;
      max-width: 800px;
    }

    h1, p {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 1s ease forwards;
    }

    h1 {
      margin: 0;
      font-size: 2.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;

      animation-delay: 1s;
    }

    p {
      margin: 14px 0;
      font-size: 1.8rem;
    }

    p:nth-of-type(1) { animation-delay: 1.6s; }
    p:nth-of-type(2) { animation-delay: 2.2s; }
    p:nth-of-type(3) {
      animation-delay: 2.8s;
      font-size: 1.3rem;
      opacity: 0.9;
    }

    /* ANIMASJONER */
    @keyframes fadeInImage {
      to { opacity: 1; }
    }

    @keyframes zoomIn {
      to { transform: scale(1); }
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

  <img src="golddiggers.jpeg" alt="Bilde">

  <div class="gradient"></div>

  <div class="overlay">
    <h1>We just love them</h1>
    <p>and will always support them heavily.</p>
    <p>Support your local gold diggers!</p>
    <p>Per Eskeland - Chairman and Founder, golddiggers.no</p>
  </div>

</body>
</html>
