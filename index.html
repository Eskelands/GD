<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <title>Min side</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      position: relative;
      font-family: sans-serif;
      background: black;
    }

    /* BILDE */
    img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    /* TEKST OVER BILDE */
    .overlay {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: white;
      z-index: 1;
      padding: 0 20px;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    p {
      margin: 8px 0;
    }
  </style>
</head>

<body>

  <img src="golddiggers.jpeg" alt="Bilde">

  <div class="overlay">
    <h1>We just love them</h1>
    <p>and will always support them heavily.</p>
    <p>Support your local gold diggers!</p>
    <p>Per Eskeland - Chairman and Founder, golddiggers.no</p>
  </div>

</body>
</html>
